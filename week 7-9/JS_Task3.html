<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>N5 - Image Gallery Preview</title>
    <script>
        function enlargeImage(img) {
            img.style.transform = "scale(1.2)";
            img.style.border = "5px solid blue";
        }
        function shrinkImage(img) {
            img.style.transform = "scale(1)";
            img.style.border = "none";
        }
    </script>
</head>
<body>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/be/X-4_with_Female_Computer_-_GPN-2000-001932.jpg/1024px-X-4_with_Female_Computer_-_GPN-2000-001932.jpg" width="300" height="300"
        onmouseover="enlargeImage(this)" 
        onmouseout="shrinkImage(this)">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/bb/SSEM_Manchester_museum.jpg/1280px-SSEM_Manchester_museum.jpg" width="350" height="300"
        onmouseover="enlargeImage(this)" 
        onmouseout="shrinkImage(this)">
</body>
</html>
